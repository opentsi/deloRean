name: Update Data


# workflow triggered both manually and by schedule
on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1,5,15 * *"
# triggers at 10:00 AM UTC on the 1st, 5th, and 15th of every month

# needed only for transfer
# permissions:
#   contents: write  # grants the GITHUB_TOKEN write access to the repo (allows automatic updates to happen)


jobs:
  setup:
    runs-on: ubuntu-latest
    container: devxygmbh/r-alpine:4-3.21
    steps:
      - name: Manual Checkout
        run: |
          apk update
          apk add git
          git clone --depth=1 https://github.com/${{ github.repository }}.git .

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $(pwd)

      - name: Install system dependencies
        run: |
          apk add harfbuzz-dev fribidi-dev
      - name: Set Repo
        run: |
          R -e 'options("repos")'
      - name: Install packages
        run: |
          R -q -e 'install.packages("pak")'
          R -q -e 'pak::pkg_install("opentsi/opentimeseries")'
          R -q -e 'pak::pkg_install("${{ github.repository }}")'

      - name: handle_update
        run: |
          R -q -e '${{ github.event.repository.name }}::handle_update()'
      - name: Commit and push changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "update data"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
